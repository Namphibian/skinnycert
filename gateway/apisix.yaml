#-----------------------------------------------------------------------------------------------------------------------
# Global Rules Definition
# Applies to all consumers, routes, and upstream configurations.
# Ensures security by default.
# Removes the server header from responses.
# Adds a `nosniff` header for enhanced security.
#---------------------------------------------------------------------------------------------------------------
global_rules:
  - id: 1
    plugins:
      response-rewrite:
        headers:
          set:
            X-Content-Type-Options: nosniff
            Content-Type: application/json
          remove:
            - Server
#---------------------------------------------------------------------------------------------------------------
# Consumer Definitions for the API
# Defines various consumers for the API.
#---------------------------------------------------------------------------------------------------------------
consumers:
  - username: public
    plugins:
      basic-auth:
        username: public
        password: public
#     - username: health
#       plugins:
#           basic-auth:
#               username: health
#               password: health
#---------------------------------------------------------------------------------------------------------------
# Route Definitions
# Defines routes for the API.
# Maps ApiSix paths to corresponding service and upstream paths.
#---------------------------------------------------------------------------------------------------------------
routes:
  - uri: /health
    methods: [ "GET", "POST" ]
    service_id: 1
  - uri: /keys
    methods: [ "GET" ]
    service_id: 1
    plugins:
      basic-auth: { }
      consumer-restriction:
        rejected_msg: "Only authorized users can view this."
        whitelist:
          - public
  - uri: /keys/*
    methods: [ "GET" ]
    service_id: 1
  - uri: /certificates
    methods: [ "GET", "POST" ]
    service_id: 1
  - uri: /certificates/*
    methods: [ "GET", "PATCH", "DELETE", "PUT" ]
    service_id: 1
  - uri: /key_types
    methods: [ "GET" ]
    service_id: 1
  - uri: /key_statuses
    methods: [ "GET" ]
    service_id: 1
  - uri: /key_type_tls_statuses
    methods: [ "GET" ]
    service_id: 1
  - uri: /swagger-ui/*
    methods: [ "GET" ]
    service_id: 1
  - uri: /api-docs/openapi.json
    methods: [ "GET" ]
    service_id: 1
#---------------------------------------------------------------------------------------------------------------
# Service Definition to Upstream (Rust API)
# Defines a service that connects to the upstream Rust API.
# Adds a request ID to each header for tracking purposes.
# Example: x_request_id:a70931f6-509f-443e-9e76-3ab02d08b0bd
#---------------------------------------------------------------------------------------------------------------
services:
  - id: 1
    upstream_id: 1
    plugins:
      request-id: { }
#---------------------------------------------------------------------------------------------------------------
# Upstream Definition for Rust API
# Specifies how to communicate with the Rust API.
# Uses the HTTPS scheme with mutual TLS (mTLS) by defining the `tls` element.
#---------------------------------------------------------------------------------------------------------------
upstreams:
  - id: 1
    nodes:
      "api.svc.docker.local:8443": 1
    type: roundrobin
    scheme: https
    pass_host: rewrite
    upstream_host: api.svc.docker.local
    tls:
      client_cert_id: mtls_cert
#---------------------------------------------------------------------------------------------------------------
# plugins listed here will be hot reloaded and override the boot configuration
#---------------------------------------------------------------------------------------------------------------
plugins:
  - name: request-id
  - name: basic-auth
  - name: consumer-restriction
  - name: mocking
  - name: response-rewrite
  - name: file-logger


#END

