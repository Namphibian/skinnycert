user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  65536;
}

http {
    upstream rest_api {
        server 127.0.0.1:9090;
    }

    # Optional HTTP listener for local debugging only
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location / {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS + mTLS
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/conf.d/sidecar.crt;
        ssl_certificate_key /etc/nginx/conf.d/sidecar.key;

        ssl_client_certificate /etc/nginx/conf.d/ca.crt;
        ssl_trusted_certificate /etc/nginx/conf.d/ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 6;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 5m;
        client_body_timeout 5;
        client_header_timeout 5;
        keepalive_timeout 7;
        send_timeout 5;

        location / {
            proxy_pass http://rest_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward client certificate to Actix (escaped)
            proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        }
    }
}
