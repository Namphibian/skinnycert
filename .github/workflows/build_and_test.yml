name: CI (docker-compose integration)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: integration

    env:
      DATABASE_URL: postgres://skinnycert_user:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/skinnycert
      RUST_LOG: info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install docker-compose standalone and psql client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl ca-certificates postgresql-client
          COMPOSE_VER="v2.20.2"
          sudo curl -L "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Start postgres via docker-compose
        run: |
          # Start only the postgres service defined in compose.yaml
          docker-compose -f ./compose.yaml up -d postgres
          # Show recent logs for debugging
          docker-compose -f ./compose.yaml logs --tail=100 postgres || true
      - name: Wait for Postgres to be ready (inside container)
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # show container status for debugging
          docker-compose -f ./compose.yaml ps
      
          # tail logs in background for extra visibility
          docker-compose -f ./compose.yaml logs --tail=200 postgres || true &
      
          # wait until pg_isready inside the container reports ready
          for i in $(seq 1 60); do
            docker exec skinnycert-postgres pg_isready -U skinnycert_user -d skinnycert && break
            echo "waiting for postgres inside container..."
            sleep 1
          done

          # final check: show last logs
          docker-compose -f ./compose.yaml logs --tail=200 postgres || true

      - name: Verify schema applied (run inside container)
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # list tables from inside the container
          docker exec -e PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} skinnycert-postgres \
            psql -U skinnycert_user -d skinnycert -c '\dt'


      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Run tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: cargo test --verbose

      - name: Tear down docker-compose
        if: always()
        run: docker-compose -f ./compose.yaml down -v
