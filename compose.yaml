name: skinnycert-stack
services:
  # -------------------------------
  # PostgreSQL Database
  # -------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: skinnycert-postgres
    hostname: postgres.svc.docker.local
    restart: always
    environment:
      POSTGRES_DB: skinnycert
      POSTGRES_USER: skinnycert_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Mount init script (automatically executed on first run)
      - type: bind
        source: ./database/init_db.sql
        target: /docker-entrypoint-initdb.d/init_db.sql
        read_only: true
      # Persistent data volume (named volume managed by Docker)
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      skinnycert:
        ipv4_address: 20.5.0.3
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U skinnycert_user -d skinnycert" ]
      interval: 5s
      timeout: 5s
      retries: 5

    # -------------------------------
    # Rust REST API Service
    # -------------------------------
  skinnycert-api:
    image: namphibian/skinnycert
    container_name: skinnycert-api-server
    hostname: api.svc.docker.local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: info
      SERVER_PORT: 9090
      SERVER_ADDRESS: 127.0.0.1
      WORKER_THREADS: 12

      # Database Configuration
      DATABASE_URL: postgresql://skinnycert_user:root123@postgres:5432/skinnycert
      DB_MAX_CONNECTIONS: 12

      #  Key Min Secure Size
      #  Used to configure the min size for it to be considered secure in a TLS environment.
      RSA_KEY_MIN_SUPPORTED_SIZE: 2048
      RSA_KEY_MAX_SUPPORTED_SIZE: 4096


      ENVIRONMENT: dev
      SQLX_OFFLINE: true
        # Expose API port directly for troubleshooting / bypassing NGINX
    ports:
      - "9090:9090" # port that skinnycert listens on
      - "8443:8443" # https port must use MLTS
      - "80:80"
    networks:
      skinnycert:
        ipv4_address: 20.5.0.4

  # -------------------------------
  # NGINX Sidecar (TLS/mTLS termination)
  # -------------------------------
  sidecar:
    image: nginx:stable-alpine3.21-slim
    container_name: nginx-sidecar
    network_mode: "service:skinnycert-api"   # Shares skinnycert REST API network stack
    volumes:
      - type: bind
        source: ./sidecar/etc/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ./certificates/mtls/ca/ca.crt
        target: /etc/nginx/conf.d/ca.crt
        read_only: true
      - type: bind
        source: ./certificates/mtls/sidecar/sidecar.crt
        target: /etc/nginx/conf.d/sidecar.crt
        read_only: true
      - type: bind
        source: ./certificates/mtls/sidecar/sidecar.key
        target: /etc/nginx/conf.d/sidecar.key
        read_only: true


  # -------------------------------
  # API Gateway (APISIX)
  # -------------------------------
  gateway:
    image: apache/apisix:${APISIX_IMAGE_TAG:-3.15.0-debian}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    container_name: api-six
    hostname: gateway.svc.docker.local
    restart: always

    volumes:
      - ./gateway/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    environment:
      - APISIX_STAND_ALONE=true
      - ADMIN_KEY=edd1c9f034335f136f87ad84b625c8f1
    ports:
      - "9443:9443/tcp"  # Public gateway port
    networks:
      skinnycert:
        ipv4_address: 20.5.0.2
  #        # Optional healthcheck to ensure gateway readiness
  #        healthcheck:
  #            test: ["CMD", "curl", "-f", "https://localhost:9443/"]
  #            interval: 5s
  #            retries: 5

  # -------------------------------
  # Benchmarking container (Taurus)
  # -------------------------------
  benchmark:
    container_name: taurus
    hostname: taurus.svc.docker.local
    stdin_open: true
    tty: true
    image: blazemeter/taurus
    restart: always
    entrypoint: /bin/sh
    volumes:
      - type: bind
        source: ./benchmarks/configs
        target: /bzt-configs
        read_only: true
      - type: bind
        source: ./benchmarks/artifacts
        target: /tmp/artifacts
        read_only: false
    networks:
      skinnycert:
        ipv4_address: 20.5.0.5

  # -------------------------------
  # Vue.js Frontend
  # -------------------------------
  skinny-vue:
    build:
      context: ./skinny_vue
    container_name: skinnycert-vue
    hostname: vue.svc.docker.local
    ports:
      - "8080:80"
    networks:
      skinnycert:
        ipv4_address: 20.5.0.6

# -------------------------------
# Volumes
# -------------------------------
volumes:
  postgres_data:
    driver: local

# -------------------------------
# Custom bridge network
# -------------------------------
networks:
  skinnycert:
    driver: bridge
    ipam:
      config:
        - subnet: 20.5.0.0/24
