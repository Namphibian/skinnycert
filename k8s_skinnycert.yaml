    #-----------------------------------------------------------------------------------------------------------------------
    # Global Rules Definition
    # Applies to all consumers, routes, and upstream configurations.
    # Ensures security by default.
    # Removes the server header from responses.
    # Adds a `nosniff` header for enhanced security.
    #---------------------------------------------------------------------------------------------------------------
    global_rules:
      - id: 1
        plugins:
          response-rewrite:
            headers:
              set:
                X-Content-Type-Options: nosniff
                Content-Type: application/json
              remove:
                - Server
    #---------------------------------------------------------------------------------------------------------------
    # Consumer Definitions for the API
    # Defines various consumers for the API.
    # For brevity, BASIC HTTP authentication is used for these consumers.
    #---------------------------------------------------------------------------------------------------------------
    consumers:
      - username: note
        plugins:
          basic-auth:
            username: note
            password: note
      - username: health
        plugins:
          basic-auth:
            username: health
            password: health
    #---------------------------------------------------------------------------------------------------------------
    # Route Definitions
    # Defines routes for the API.
    # Maps ApiSix paths to corresponding service and upstream paths.
    #---------------------------------------------------------------------------------------------------------------
    routes:
      - uri: /health
        service_id: 1
        plugins:
          basic-auth: { }
          consumer-restriction:
            rejected_msg: "Only users with the health permissions can view this."
            whitelist:
              - health
      - uri: /note
        service_id: 1
        plugins:
          basic-auth: { }
          consumer-restriction:
            whitelist:
              - note
      - uri: /posts
        methods:
          - GET
        #---------------------------------------------------------------------------------------------------------------
        # Setup a mock endpoint
        # This is an example that could be used when mocking out responses.
        #---------------------------------------------------------------------------------------------------------------
        plugins:
          mocking:
            delay: 1
            content_type: "application/json",
            response_status: 200
            response_schema:
              properties:
                title:
                  example: "A new post"
                  type: string
    #---------------------------------------------------------------------------------------------------------------
    # Service Definition to Upstream (Rust API)
    # Defines a service that connects to the upstream Rust API.
    # Adds a request ID to each header for tracking purposes.
    # Example: x_request_id:a70931f6-509f-443e-9e76-3ab02d08b0bd
    #---------------------------------------------------------------------------------------------------------------
    services:
      - id: 1
        upstream_id: 1
        plugins:
          request-id: { }
    #---------------------------------------------------------------------------------------------------------------
    # Upstream Definition for Rust API
    # Specifies how to communicate with the Rust API.
    # Uses the HTTPS scheme with mutual TLS (mTLS) by defining the `tls` element.
    #---------------------------------------------------------------------------------------------------------------
    upstreams:
      - id: 1
        nodes:
          "api.svc.docker.local:8443": 1
        type: roundrobin
        scheme: https
        pass_host: rewrite
        upstream_host: api.svc.docker.local
        tls:
          client_cert_id: mtls_cert
    #---------------------------------------------------------------------------------------------------------------
    # plugins listed here will be hot reloaded and override the boot configuration
    #---------------------------------------------------------------------------------------------------------------
    plugins:
      - name: request-id
      - name: basic-auth
      - name: consumer-restriction
      - name: mocking
      - name: response-rewrite
      - name: file-logger
    
    
    #END




---
# -------------------------------
# REST API Deployment + Service
# -------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skinnycert-api
  namespace: skinnycert
spec:
  replicas: 0
  selector:
    matchLabels:
      app: skinnycert-api
  template:
    metadata:
      labels:
        app: skinnycert-api
    spec:
      containers:
        - name: skinnycert
          image: namphibian/skinnycert:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 80
          env:
            - name: RUST_LOG
              value: "info"
            - name: SERVER_PORT
              value: "80"
            - name: SERVER_ADDRESS
              value: "0.0.0.0"
            - name: WORKER_THREADS
              value: "6"
#        - name: sidecar
#          image: nginx:stable-alpine3.21-slim
#          ports:
#            - containerPort: 8443
#          volumeMounts:
#            - name: nginx-config
#              mountPath: /etc/nginx/nginx.conf
#              subPath: nginx.conf
#              readOnly: true
#            - name: certs
#              mountPath: /etc/nginx/conf.d
#              readOnly: true
#      volumes:
#        - name: nginx-config
#          configMap:
#            name: nginx-config
#        - name: certs
#          secret:
#            secretName: sidecar-certs

---
apiVersion: v1
kind: Service
metadata:
  name: skinnycert-api
  namespace: skinnycert
spec:
  selector:
    app: skinnycert-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: https
      port: 8443
      targetPort: 8443
    - name: alt-http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skinnycert-ingress
  namespace: skinnycert
spec:
  rules:
    - host: skinnycert.dev.minikube
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: skinnycert-api
                port:
                  number: 80
---
# -------------------------------
# Gateway (APISIX)
# -------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skinnycert-gateway
  namespace: skinnycert
spec:
  replicas: 0
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: skinnycert-gateway
  template:
    metadata:
      labels:
        app: skinnycert-gateway
    spec:
      containers:
        - name: gateway
          image: apache/apisix:3.9.0-debian
          ports:
            - containerPort: 9443
          env:
            - name: APISIX_STAND_ALONE
              value: "true"
          volumeMounts:
            - name: apisix-config
              mountPath: /usr/local/apisix/conf/apisix.yaml
              subPath: apisix.yaml
              readOnly: true
      volumes:
        - name: apisix-config
          configMap:
            name: apisix-config

---
apiVersion: v1
kind: Service
metadata:
  name: skinnycert-gateway
  namespace: skinnycert
spec:
  selector:
    app: skinnycert-gateway
  ports:
    - name: https
      port: 9443
      targetPort: 9443
  type: LoadBalancer

---
# -------------------------------
# Benchmark (Taurus)
# -------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skinnycert-benchmark
  namespace: skinnycert
spec:
  replicas: 0
  selector:
    matchLabels:
      app: skinnycert-benchmark
  template:
    metadata:
      labels:
        app: skinnycert-benchmark
    spec:
      containers:
        - name: taurus
          image: blazemeter/taurus
          tty: true
          stdin: true
          command: [ "/bin/sh" ]
          volumeMounts:
            - name: taurus-configs
              mountPath: /bzt-configs
              readOnly: true
            - name: taurus-artifacts
              mountPath: /tmp/artifacts
      volumes:
        - name: taurus-configs
          hostPath:
            path: ./benchmarks/configs
        - name: taurus-artifacts
          hostPath:
            path: ./benchmarks/artifacts

