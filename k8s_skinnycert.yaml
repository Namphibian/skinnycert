#apiVersion: v1
#kind: Namespace
#metadata:
#  name: skinnycert

---
# -------------------------------
# ConfigMaps & Secrets
# -------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: skinnycert
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    
    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;
    
    events {
    worker_connections  65536;
    }
    
    http {
    upstream rest_api {
      server 127.0.0.1:3000;
    }
    
    # Plain HTTP — useful for debugging / basic connectivity tests
    server {
      listen 80;
      listen [::]:80;
      server_name _;
      location / {
        proxy_pass http://rest_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
      }
    }
    
    # HTTPS + mTLS
      server {
        listen 8443 ssl;
        ssl_certificate /etc/nginx/conf.d/sidecar.crt;
        ssl_certificate_key /etc/nginx/conf.d/sidecar.key;
        ssl_trusted_certificate /etc/nginx/conf.d/ca.crt;
        ssl_client_certificate /etc/nginx/conf.d/ca.crt;
        ssl_verify_client on;
    
        client_body_timeout 5;
        client_header_timeout 5;
        keepalive_timeout 7;
        send_timeout 5;
        location / {
          proxy_pass http://rest_api;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_connect_timeout 5s;
          proxy_read_timeout 10s;
          proxy_send_timeout 10s;
        }
      }
    }


---
