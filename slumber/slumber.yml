name: Skinny Cert

# Profiles are groups of data you can easily switch between. A common usage is
# to define profiles for various environments of a REST service
profiles:
  local:
    name: Local Testing
    data:
      host: http://127.0.0.1:9090

requests:
  certificates_folder:
    name: Certificates
    requests:
      list_all_certificates:
        name: Get All Certificates
        method: GET
        url: "{{ host }}/certificates"
  ecdsa_keys_folder:
    name: ECDSA Keys
    requests:
      list_all_ecdsa:
        name: List All
        method: GET
        url: "{{ host }}/keys/ecdsa"
      get_ecdsa_by_id:
        name: Get By ID
        method: GET
        url: "{{ host }}/keys/ecdsa/dd0b6bfd-4c48-4874-b260-b913e717aae1"
      generate_ecdsa_key_pair:
        name: Generate key pair.
        method: GET
        url: "{{ host }}/keys/ecdsa/dd0b6bfd-4c48-4874-b260-b913e717aae1/keypair"
  rsa_keys_folder:
    name: RSA Keys
    requests:
      list_all_rsa:
        name: List All
        method: GET
        url: "{{ host }}/keys/rsa"
      get_rsa_by_id:
        name: Get By ID
        method: GET
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5"
      create:
        name: Create
        method: POST
        url: "{{ host }}/keys/rsa"
        body:
          type: json
          data:
            { "rsa_key_size": 64}
      update:
        name: Update Deprecate Key
        method: PATCH
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5"
        body:
          type: json
          data:
            { "deprecated": true }
      generate_key_pair:
        name: Generate a key pair.
        method: GET
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5/keypair"
  health_check_folder:
    name: Health Checks
    requests:
      health:
        name: Health Check
        method: GET
        url: "{{ host }}/health"

