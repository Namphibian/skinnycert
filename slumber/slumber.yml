name: Skinny Cert

# Profiles are groups of data you can easily switch between. A common usage is
# to define profiles for various environments of a REST service
profiles:
  local:
    name: Local Testing
    data:
      host: http://127.0.0.1:9090

requests:
  key_status_folder:
    name: Key Status
    requests:
      get_key_status:
        name: Get Key Status
        method: GET
        url: "{{ host }}/key_statuses"
  certificates_folder:
    name: Certificates
    requests:
      fail_delete_certificate:
        name: Fail DELETE Certificate
        method: DELETE
        url: "{{ host }}/certificates/161abdb1-1d1b-11da-1e11-1f1f1b111ad1"
      delete_certificate:
        name: DELETE Certificate
        method: DELETE
        url: "{{ host }}/certificates/c16393fd-2498-4f32-987f-a72b75cb2513"
      fail_put_certificate:
        name: Fail PUT Certificate
        method: PUT
        url: "{{ host }}/certificates/c62abdb7-4d7b-43da-9e95-5f1f8b814ad9"
        body:
          type: json
          data:
            { "subject": { "organization": "Example Corp" } }
      list_all_certificates_with_filters:
        name: Get All Certificates
        method: GET
        url: "{{ host }}/certificates?limit=10&direction=next"
      list_all_certificates_with_invalid_token:
        name: Get All Certificates Invalid Token
        method: GET
        url: "{{ host }}/certificates?limit=10&direction=next&pageToken=BAD_TOKEN"
      list_all_rsa_certificates:
        name: Get All RSA Certificates
        method: GET
        url: "{{ host }}/certificates?algorithm_type_name=RSA"
      create_rsa_2048_certificate:
        name: Create RSA 2048 Certificate
        method: POST
        url: "{{ host }}/certificates"
        headers:
          Content-Type: application/json
        body: | 
          { 
            "key_algorithm_id": "c62abdb7-4d7b-43da-9e95-5f1f8b814ad9", 
            "subject": 
              { 
                "organization": "Example Corp", 
                "organizational_unit": "IT", 
                "country": "US", 
                "state_or_province": "California", 
                "locality": "San Francisco", 
                "email": "admin@example.com" 
            }, 
            "sans": [ "example.com", "www.example.com" ], 
            "validity_days": 365 
          }
  keys_folder:
    name: Key Algorithm
    requests:
      list_all_algo:
        name: List All
        method: GET
        url: "{{ host }}/keys"
      list_all_rsa_algo:
        name: List RSA Keys
        method: GET
        url: "{{ host }}/keys?algorithmType=RSA&strength=2048"
      list_all_ecdsa_algo:
        name: List All ECDSA Keys
        method: GET
        url: "{{ host }}/keys?algorithmType=ECDSA"
      get_key_by_id:
        name: Get By ID
        method: GET
        url: "{{ host }}/keys/c62abdb7-4d7b-43da-9e95-5f1f8b814ad9"
      generate_key_pair_by_id:
        name: Generate key pair.
        method: GET
        url: "{{ host }}/keys/c62abdb7-4d7b-43da-9e95-5f1f8b814ad9/keypair"
  rsa_keys_folder:
    name: RSA Keys LEGACY.
    requests:
      list_all_rsa:
        name: List All
        method: GET
        url: "{{ host }}/keys/rsa"
      get_rsa_by_id:
        name: Get By ID
        method: GET
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5"
      create:
        name: Create
        method: POST
        url: "{{ host }}/keys/rsa"
        body:
          type: json
          data:
            { "rsa_key_size": 64 }
      update:
        name: Update Deprecate Key
        method: PATCH
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5"
        body:
          type: json
          data:
            { "deprecated": true }
      generate_key_pair:
        name: Generate a key pair.
        method: GET
        url: "{{ host }}/keys/rsa/b277f798-481a-40ce-8a55-c1616262cfe5/keypair"
  health_check_folder:
    name: Health Checks
    requests:
      health:
        name: Health Check
        method: GET
        url: "{{ host }}/health"

